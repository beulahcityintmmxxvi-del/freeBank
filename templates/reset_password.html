{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card card-soft p-4">
      <h2 class="fw-bold mb-1">Reset password</h2>
      <p class="text-muted mb-4">Choose a new secure password.</p>

      <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
          <label class="form-label">{{ form.password.label }}</label>
          {{ form.password(class="form-control", placeholder="New password") }}
        </div>

        <div class="mb-3">
          <label class="form-label">{{ form.confirm_password.label }}</label>
          {{ form.confirm_password(class="form-control", placeholder="Confirm password") }}
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">
          {{ form.submit.label.text }}
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
