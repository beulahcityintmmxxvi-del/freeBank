{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card card-soft p-4">
      <h2 class="fw-bold mb-1">Authorize transaction</h2>
      <p class="text-muted">
        Enter the OTP to complete the transfer.
        <br>
        <small class="text-muted">OTP appears in your Flask terminal during development.</small>
      </p>

      <div class="mb-3 p-3 rounded-3 bg-light">
        <div><strong>Receiver:</strong> {{ tx.receiver }}</div>
        <div><strong>Purpose:</strong> {{ tx.purpose }}</div>
        <div><strong>Amount:</strong> ${{ '{:,.2f}'.format(tx.amount_cents / 100) }}</div>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">OTP Code</label>
          <input class="form-control" name="otp" placeholder="6-digit code" required>
        </div>
        <button class="btn btn-primary">Verify & Complete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
